<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mobile Checkers</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <main class="game">
      <header class="game-header">
        <h1>Checkers</h1>
        <p id="status" aria-live="polite">Red's turn</p>
      </header>

      <section class="board-wrapper">
        <div id="board" class="board" role="grid" aria-label="Checkers board"></div>
      </section>

      <button id="restartBtn" type="button" class="restart-btn">Restart Game</button>
    </main>

    <script src="script.js"></script>
  </body>
</html>
